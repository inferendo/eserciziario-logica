name: Build Typst documents

on:
  push:
    paths-ignore:
      - '**.pdf'

permissions:
  contents: write

jobs:
  build_lista:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Typst PDF
        uses: Jarivanbakel/typst-action@v3
        with:
          input_files: lista_es.typ

      - name: Move PDF to output location
        run: |
          mkdir -p pdf
          mv lista_es.pdf pdf/lista_es.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/lista_es.pdf
          git commit -m "Add generated PDF [auto]" || echo "No changes to commit"
          git pull --rebase
          git push

  generate_prove:
    runs-on: ubuntu-latest
    needs: build_lista

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Pull latest changes
        run: git pull

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Generate 100 PDFs
        run: |
          mkdir -p prove_es
          for i in $(seq 1 100); do
            echo "=== Iteration $i ==="
            random_number=$((RANDOM * 31 + RANDOM % 1000001))
            typst compile main.typ --input seed=$random_number prove_es/$i.pdf
            echo "Compiled prove_es/$i.pdf with seed $random_number"
          done

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prove_es/
          git commit -m "Generate PDFs [auto]" || echo "No changes to commit"
          git pull --rebase
          git push