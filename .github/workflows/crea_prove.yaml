name: Genera prove PDF

on:
  push:
    paths-ignore:
      - '**.pdf'

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Generate 100 PDFs
        run: |
          mkdir -p prove_es
          for i in $(seq 1 100); do
            echo "=== Iteration $i ==="
            random_number=$((RANDOM * 31 + RANDOM % 1000001))
            typst compile main.typ --input seed=$random_number prove_es/$i.pdf
            echo "Compiled prove_es/$i.pdf with seed $random_number"
          done

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prove_es/
          git commit -m "Generate PDFs [auto]" || echo "No changes to commit"
          git push